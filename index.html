<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Age Calculator</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ─── Background blobs ─────────────────────────────────── -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <!-- ─── Main card ─────────────────────────────────────────── -->
  <main class="card" role="main">

    <!-- Header -->
    <header class="card-header">
      <div class="icon-wrap" aria-hidden="true">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </div>
      <div>
        <h1>Age Calculator</h1>
        <p class="tagline">Find out exactly how old you are ✨</p>
      </div>
    </header>

    <!-- Form -->
    <section class="form-section" aria-label="Date of Birth Input">
      <label class="section-label">📅 Date of Birth</label>
      <div class="dob-row">
        <div class="select-wrap">
          <select id="sel-day" aria-label="Day">
            <option value="">Day</option>
          </select>
          <span class="select-hint">Day</span>
        </div>
        <div class="select-wrap">
          <select id="sel-month" aria-label="Month">
            <option value="">Month</option>
            <option value="0">January</option>
            <option value="1">February</option>
            <option value="2">March</option>
            <option value="3">April</option>
            <option value="4">May</option>
            <option value="5">June</option>
            <option value="6">July</option>
            <option value="7">August</option>
            <option value="8">September</option>
            <option value="9">October</option>
            <option value="10">November</option>
            <option value="11">December</option>
          </select>
          <span class="select-hint">Month</span>
        </div>
        <div class="select-wrap">
          <select id="sel-year" aria-label="Year">
            <option value="">Year</option>
          </select>
          <span class="select-hint">Year</span>
        </div>
      </div>

      <!-- Error -->
      <div class="error-box" id="error-box" role="alert" aria-live="polite" hidden>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="error-text"></span>
      </div>

      <!-- Button -->
      <button class="calc-btn" id="calc-btn" onclick="calculateAge()">
        <span class="btn-text">Calculate My Age</span>
        <svg class="btn-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </section>

    <!-- Result -->
    <section class="result-section" id="result-section" aria-label="Age Result" aria-live="polite" hidden>

      <!-- Confetti strip -->
      <div class="confetti-row" id="confetti-row" aria-hidden="true"></div>

      <p class="result-label">🎉 Your exact age is</p>

      <!-- Big 3 stats -->
      <div class="stats-grid">
        <div class="stat-card" id="card-years">
          <span class="stat-num" id="r-years">0</span>
          <span class="stat-unit">Years</span>
        </div>
        <div class="stat-card" id="card-months">
          <span class="stat-num" id="r-months">0</span>
          <span class="stat-unit">Months</span>
        </div>
        <div class="stat-card" id="card-days">
          <span class="stat-num" id="r-days">0</span>
          <span class="stat-unit">Days</span>
        </div>
      </div>

      <!-- Birthday countdown -->
      <div class="bday-banner" id="bday-banner">
        <span class="bday-emoji" id="bday-emoji">🎂</span>
        <div>
          <p class="bday-title" id="bday-title"></p>
          <p class="bday-sub" id="bday-sub"></p>
        </div>
      </div>

      <!-- Extra totals -->
      <div class="totals-row">
        <div class="total-chip">
          <span class="chip-icon">📆</span>
          <span class="chip-val" id="t-months"></span>
          <span class="chip-lbl">total months</span>
        </div>
        <div class="total-chip">
          <span class="chip-icon">📅</span>
          <span class="chip-val" id="t-days"></span>
          <span class="chip-lbl">total days</span>
        </div>
        <div class="total-chip">
          <span class="chip-icon">⏰</span>
          <span class="chip-val" id="t-hours"></span>
          <span class="chip-lbl">total hours</span>
        </div>
        <div class="total-chip">
          <span class="chip-icon">⏱️</span>
          <span class="chip-val" id="t-mins"></span>
          <span class="chip-lbl">total minutes</span>
        </div>
      </div>

      <!-- Reset -->
      <button class="reset-btn" onclick="resetCalc()">← Calculate Again</button>
    </section>

  </main>

  <footer class="footer">
    🚀 ✨ Crafted with ❤️ by Rajpal Singh Panwar 2026 💜 🚀
  </footer>

  <script src="script.js"></script>
</body>
</html>
